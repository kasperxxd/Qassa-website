databases:
  - name: qassa-db
    plan: free
    databaseName: qassa
    user: qassa

services:
  - type: web
    name: qassa
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    healthCheckPath: /api/healthz
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/qassa run build
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db run push-force
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
      - key: BASE_PATH
        value: /
      - key: STATIC_DIR
        value: artifacts/qassa/dist/public
      - key: DATABASE_URL
        fromDatabase:
          name: qassa-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
